<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TipidLitro — Fuel Trip Planner</title>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0f0e;--surface:#131918;--surface2:#1a2120;--border:#243130;
      --accent:#ff773d;--accent2:#ff773d;--accent-dim:rgba(255,119,61,.12);
      --text:#e8f0ef;--text2:#8fa8a4;--text3:#506663;
      --radius:16px;--radius-sm:10px;--tr:.18s cubic-bezier(.4,0,.2,1);
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
      --page-max:1160px;--input-h:44px;--btn-primary-h:50px;--focus-ring:0 0 0 3px var(--accent-dim);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    body::before{
      content:'';
      position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none;z-index:9999;opacity:.45;
    }

    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(255,119,61,.06);top:-200px;right:-100px}
    .blob-2{width:350px;height:350px;background:rgba(255,119,61,.04);bottom:0;left:-100px}

    .app{position:relative;z-index:1;max-width:var(--page-max);margin:0 auto;padding:0 16px 60px}
    @media(min-width:480px){.app{padding:0 20px 80px}}
    @media(min-width:768px){.app{padding:0 28px 80px}}

    header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 32px;gap:12px}
    @media(min-width:480px){header{padding:28px 0 40px}}

    .logo{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-.5px;flex-shrink:0}
    @media(min-width:480px){.logo{font-size:22px}}
    .logo-icon{width:34px;height:34px;border-radius:10px;display:block;object-fit:contain;flex-shrink:0}
    .logo span{color:var(--accent)}

    .badge{font-size:11px;font-weight:500;padding:5px 11px;border-radius:100px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,119,61,.2);white-space:nowrap}

    .nav-tabs{
      display:flex;gap:6px;margin-bottom:28px;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-sm);padding:5px;width:100%;max-width:100%;flex-wrap:wrap;justify-content:center
    }
    @media(min-width:480px){.nav-tabs{gap:8px;margin-bottom:36px}}
    .nav-tab{
      font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--text2);
      background:none;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;transition:all var(--tr);
      text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;min-height:36px;-webkit-tap-highlight-color:transparent;
      touch-action:manipulation
    }
    .nav-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:600}

    .hero{
      margin-bottom:28px;
      background-image:url("hero-bg.png");
      background-size:cover;
      background-position:center;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:24px 16px;
      position:relative;
      overflow:hidden;
    }
    @media(min-width:480px){.hero{margin-bottom:36px;padding:28px 20px}}

    .hero::before{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(11,15,14,.55) 0%, rgba(11,15,14,.75) 100%);
      pointer-events:none;
    }

    .hero > *{position:relative}

    .hero-label{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .hero-label::before{content:'';display:inline-block;width:18px;height:2px;background:var(--accent);border-radius:2px}

    .hero h1{font-family:var(--font-display);font-size:clamp(28px,7vw,54px);font-weight:800;line-height:1.08;letter-spacing:-1.5px;margin-bottom:10px}
    .hero h1 em{font-style:normal;color:var(--accent)}
    .hero p{font-size:14px;color:var(--text2);line-height:1.65;max-width:520px;font-weight:300;margin-bottom:16px}
    @media(min-width:480px){.hero p{font-size:15px}}

    .hero-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .hero-meta-item{font-size:12px;color:var(--text3);font-weight:400}
    .hero-meta-dot{color:var(--border);font-size:13px}

    .btn{
      width:100%;
      height:var(--btn-primary-h);
      background:var(--accent);
      color:#0b0f0e;
      border:none;
      border-radius:var(--radius-sm);
      font-family:var(--font-display);
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:all var(--tr);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:18px;
      letter-spacing:.01em;
      text-decoration:none;
    }
    .btn:hover{opacity:.9}
    .btn:active{transform:scale(.98);opacity:.85}
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="app">
    <header>
      <a class="logo" href="index.html">
        <img class="logo-icon" src="logo.png" alt="TipidLitro">
        Tipid<span>Litro</span>
      </a>
      <span class="badge">Home</span>
    </header>

    <div class="nav-tabs">
      <a class="nav-tab active" href="index.html">Home</a>
      <a class="nav-tab" href="tipidlitro-calculator.html">🗺️ Trip Calculator</a>
      <a class="nav-tab" href="tipidlitro-range.html">📏 Range Calculator</a>
      <a class="nav-tab" href="tipidlitro-stations.html">⛽ Gas Stations</a>
    </div>

    <section class="hero">
      <div class="hero-label">Smart Fuel Intelligence</div>
      <h1>Fuel Smarter<br>with <em>TipidLitro</em></h1>
      <p>Trip Calculator, Range Calculator, and Gas Stations — all in one app.</p>
      <div class="hero-meta">
        <span class="hero-meta-item">✅ No app download needed</span>
        <span class="hero-meta-dot">·</span>
        <span class="hero-meta-item">Works right in your browser</span>
      </div>

    </section>
  </div>
</body>
</html>
